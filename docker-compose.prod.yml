services:
  api:
    build:
      context: ./firmware-scanner
      dockerfile: Dockerfile.api
    ports:
      - "4521:8000"
    env_file:
      - ./firmware-scanner/.env
    volumes:
      - helix_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./helix-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4521}
    ports:
      - "4522:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  helix_data:
