# Supporting infra for local development of the FastAPI layer.
# Not the sandbox scanner compose file (see docker-compose.yml for that).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Faz 5 — async queue: set in firmware-scanner/.env:
#   HELIX_USE_CELERY=true
#   HELIX_REDIS_URL=redis://localhost:6379/0
# Then start a worker (Windows requires --pool=solo; prefork doesn't work there):
#   celery -A api.celery_app worker --loglevel=info --pool=solo
#
# Faz 6 — PostgreSQL data layer: set in firmware-scanner/.env:
#   HELIX_DATABASE_URL=postgresql+psycopg://helix:helix@localhost:5432/helixdb
# Migrations apply automatically on API startup (api/main.py -> alembic upgrade head).
# To run them manually instead: alembic upgrade head
#
# Faz 6 — MinIO object storage: set in firmware-scanner/.env:
#   HELIX_USE_OBJECT_STORAGE=true
#   HELIX_MINIO_ENDPOINT=localhost:9000
# Console (bucket browser) at http://localhost:9001 — login helixadmin/helixsecret

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: helix
      POSTGRES_DB: helixdb
    ports:
      - "5432:5432"
    volumes:
      - helix_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helixdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: helixadmin
      MINIO_ROOT_PASSWORD: helixsecret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - helix_minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  helix_pg_data:
  helix_minio_data:
